version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: vms-postgres
    environment:
      POSTGRES_USER: vms
      POSTGRES_PASSWORD: vms123
      POSTGRES_DB: vmsdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7.2-alpine
    container_name: vms-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: